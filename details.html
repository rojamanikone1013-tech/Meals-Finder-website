<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Meal Details</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
    background:#f5f5f5;
}

.details-card{
    background:#fff;
    padding:40px;
    box-shadow:0 0 20px rgba(0,0,0,.1);
}

.meal-img{
    width:100%;
    height:450px;
    object-fit:cover;
    border-radius:10px;
}

.ingredients-box{
    background:#f25c05;
    color:white;
    padding:20px;
    margin-top:16px;
}
.ingredients-box ul{
    columns:2;
    column-gap:30px;
    margin:0;
    padding-left:20px;
}


.measures-box{
    border:1px solid #ddd;
    padding:20px;
    margin-top:20px;
    margin-bottom:20px;
}

.instructions{
    margin-top:20px;
}
.ingredients-box li{
    margin-bottom:8px;
}
#measure1,
#measure2{
    margin: 0;
    padding-left: 15px;
}

#measure1 li,
#measure2 li{
    margin-bottom: 0;
    line-height: 1.1;
    padding: 0;
}

a{
    text-decoration:none;
}
</style>

</head>
<body>

<div class="container py-5">

    <h2 class="fw-bold mb-4">
        MEAL DETAILS
    </h2>

    <div class="details-card">

        <!-- TOP SECTION -->
        <div class="row">

            <!-- LEFT IMAGE -->
            <div class="col-lg-5">
                <img
                    id="mealImage"
                    class="meal-img"
                    src="">
            </div>

            <!-- RIGHT DETAILS -->
            <div class="col-lg-7">

                <h2
                    id="mealName"
                    class="title mb-3">
                </h2>

                <hr>

                <p>
                    <strong>Category:</strong>
                    <span id="mealCategory"></span>
                </p>

                <p>
                    <strong>Area:</strong>
                    <span id="mealArea"></span>
                </p>

                <p>
                    <strong>Source:</strong>
                    <a id="mealSource" target="_blank"></a>
                </p>

                <p>
                    <strong>Tags:</strong>
                    <span id="mealTags"></span>
                </p>

                <!-- INGREDIENTS -->
                <div class="bg-orange-600 text-white p-4 mt-4 rounded">

                    <h5 class="text-2xl font-bold mb-3">
                        Ingredients
                    </h5>

                    <div
                        id="ingredientsList"
                        class="grid grid-cols-3 gap-2">
                    </div>

                </div>

            </div>

        </div>
        <!-- ROW END -->


        <!-- MEASURES -->
        <div class="border border-gray-300 p-2 mt-3">

            <h5 class="font-bold text-xl mb-4">
                Measure:
            </h5>

            <div class="row">

                <div class="col-md-6">
                    <ul
                        id="measure1"
                        class="space-y-0">
                    </ul>
                </div>

                <div class="col-md-6">
                    <ul
                        id="measure2"
                        class="space-y-0">
                    </ul>
                </div>

            </div>

        </div>


        <!-- INSTRUCTIONS -->
        <div class="mt-5">

            <h5 class="fw-bold mb-4">
                Instructions
            </h5>

            <div id="mealInstructions"></div>

        </div>


        <!-- BACK BUTTON -->
        <a
            href="index.html"
            class="btn btn-warning mt-4">

            ← Back To Home

        </a>

    </div>

</div>
<script>


const meal =
JSON.parse(localStorage.getItem("mealDetails"));

document.getElementById("mealImage").src =
meal.strMealThumb;

document.getElementById("mealName").textContent =
meal.strMeal;

document.getElementById("mealCategory").textContent =
meal.strCategory;

document.getElementById("mealArea").textContent =
meal.strArea;

document.getElementById("mealSource").href =
meal.strSource || "#";

document.getElementById("mealSource").textContent =
meal.strSource || "No Source Available";

document.getElementById("mealTags").textContent =
meal.strTags || "No Tags";

const ingredientsList =
document.getElementById("ingredientsList");

const measure1 =
document.getElementById("measure1");

const measure2 =
document.getElementById("measure2");

let count = 0;
let ingredientNo = 1;

for(let i = 1; i <= 20; i++){

    const ingredient =
    meal[`strIngredient${i}`];

    const measure =
    meal[`strMeasure${i}`];

    if(
        ingredient &&
        ingredient.trim() !== ""
    ){

        // Ingredients
        ingredientsList.innerHTML += `
        <div class="flex items-center gap-2">

            <span
            class="w-7 h-7 rounded-full bg-teal-500 flex items-center justify-center text-sm">

                ${ingredientNo}

            </span>

            <span>
                ${ingredient}
            </span>

        </div>
        `;

        // Measures
        if(count < 10){

            measure1.innerHTML += `
            <li class="flex items-center gap-2">

                <span class="text-orange-600">
                    🔑
                </span>

                ${measure}

            </li>
            `;

        }
        else{

            measure2.innerHTML += `
            <li class="flex items-center gap-2">

                <span class="text-orange-600">
                    🔑
                </span>

                ${measure}

            </li>
            `;
        }

        ingredientNo++;
        count++;
    }
}


// Instructions as points
const instructionsDiv =
document.getElementById("mealInstructions");

const steps =
meal.strInstructions.split(". ");

instructionsDiv.innerHTML = "";

steps.forEach(step => {
    if(step.trim() !== ""){
        instructionsDiv.innerHTML += `
            <p>☑ ${step}.</p>
        `;
    }
});

</script>

</body>
</html>
